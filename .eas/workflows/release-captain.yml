  # build_prod_android:
  #   name: Build Android (store)
  #   needs: [get_prod_build_android]
  #   if: ${{ !needs.get_prod_build_android.outputs.build_id && (inputs.platform == 'android' || inputs.platform == 'all') }}
  #   type: build
  #   environment: production
  #   params:
  #     platform: android
  #     profile: production
  #
  # submit_android:
  #   name: Submit to Play Console
  #   type: submit
  #   needs: [approval, build_prod_android]
  #   params:
  #     build_id: ${{ needs.build_prod_android.outputs.build_id }}
