name: build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build & submit
        type: choice
        options:
          - ios
          - android
          - all
        default: ios

jobs:
  build_ios:
    name: Build iOS
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    type: build
    environment: production
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit to TestFlight
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  build_android:
    name: Build Android
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    type: build
    environment: production
    params:
      platform: android
      profile: production

  submit_android:
    name: Submit to Play Console
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production
