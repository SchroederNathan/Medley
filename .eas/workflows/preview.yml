name: preview

on:
  pull_request: {}

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

jobs:
  update:
    name: EAS Update (development)
    type: update
    environment: development
    params:
      channel: development

  get_dev_build:
    name: Get latest development build
    type: get-build
    params:
      profile: development

  comment:
    name: Post preview to PR
    type: github-comment
    needs: [update, get_dev_build]
    params:
      message: 'Development preview is ready! Install the development build below, then open the update link inside it.'
      build_ids:
        - ${{ needs.get_dev_build.outputs.build_id }}
