# Staging deploy — every merge to main updates the PREVIEW channel and keeps
# the surfboard build fresh. Production (store submit AND production-channel
# OTA) ships only via release-captain.yml on a v* tag, behind its gates.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  update:
    name: EAS Update → preview (staging)
    type: update
    environment: preview
    params:
      channel: preview
      message: 'main: ${{ github.commit_message }}'

  # Keep a canonical "surfboard" preview build available: whenever native code
  # changes on main, build a fresh internal preview build that testers install
  # to channel-surf PR previews (see preview.yml).
  fingerprint:
    name: Fingerprint native runtime
    type: fingerprint
    environment: preview

  get_preview_build:
    name: Find surfboard build for current fingerprint
    needs: [fingerprint]
    type: get-build
    params:
      platform: ios
      profile: preview
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      wait_for_in_progress: true

  build_preview:
    name: Build new surfboard (native changed)
    needs: [get_preview_build]
    if: ${{ !needs.get_preview_build.outputs.build_id }}
    type: build
    environment: preview
    params:
      platform: ios
      profile: preview

