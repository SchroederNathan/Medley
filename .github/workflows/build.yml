name: build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build & submit
        type: choice
        options:
          - ios
          - android
          - all
        default: ios

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios:
    name: iOS → TestFlight
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    runs-on: macos-26 # matches local Xcode 26 / iOS 26 SDK
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build iOS .ipa locally
        run: |
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output ./build.ipa

      - name: Submit to TestFlight
        run: |
          eas submit \
            --platform ios \
            --path ./build.ipa \
            --profile production \
            --non-interactive

  android:
    name: Android → Play Internal
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Android .aab locally
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ./build.aab

      - name: Submit to Play Console
        run: |
          eas submit \
            --platform android \
            --path ./build.aab \
            --profile production \
            --non-interactive
